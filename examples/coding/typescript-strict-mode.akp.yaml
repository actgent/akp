## Decision
All new TypeScript projects MUST enable `"strict": true` in tsconfig.json.

## Context
We found that projects without strict mode had 2.3x more type-related bugs in production.
The most impactful flags are `strictNullChecks` and `noImplicitAny`.

## Alternatives Considered
- **No strict mode**: Faster initial development but more runtime errors
- **Selective flags**: Only `strictNullChecks` — catches 70% of issues but misses `noImplicitAny`
- **Full strict**: Catches the most issues, slight learning curve

## Consequences
- New developers may need time to adjust to stricter typing
- Some third-party libraries may need type assertions
- Significantly fewer null/undefined runtime errors
