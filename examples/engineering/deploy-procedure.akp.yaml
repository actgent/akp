## Prerequisites
- All tests passing on main branch
- No active incidents (check #oncall channel)
- At least 2 hours before end of business day

## Steps
1. Create release branch from main
2. Run `npm run build` and verify no warnings
3. Deploy to staging: `gcloud run deploy --tag staging`
4. Run smoke tests against staging URL
5. If smoke tests pass, promote to production: `gcloud run services update-traffic --to-latest`
6. Monitor error rates for 15 minutes post-deploy

## Rollback
If error rate exceeds 1%, immediately rollback:
```
gcloud run services update-traffic --to-revisions=PREVIOUS_REVISION=100
```
