Deployments after 3pm Friday have a 3x higher incident rate due to reduced
staffing for incident response over the weekend.

## What to do instead
- Schedule deployments for Monday–Thursday before 2pm
- If a Friday deploy is unavoidable, ensure on-call coverage through the weekend
- Use feature flags to decouple deployment from activation

## Evidence
- Google SRE Handbook recommends avoiding end-of-week changes
- PagerDuty incident data shows 67% more Friday evening pages vs Tuesday
